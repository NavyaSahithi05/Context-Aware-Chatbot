<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        #chatbox {
            height: 400px;
            padding: 15px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
        }

        .msg {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            max-width: 70%;
        }

        .user {
            background: #DCF8C6;
            align-self: flex-end;
        }

        .bot {
            background: #eee;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: gray;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Customer Support Chatbot</div>

    <div id="chatbox"></div>

    <div class="hint">Try: "Where is my order?" → then "12345"</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;
    if (input.trim() === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="msg user">${input}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        setTimeout(() => {
            chatbox.innerHTML += `<div class="msg bot">${data.response}</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }, 500); // small delay for realism
    });

    document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
